<div class="articles-page">

  <div class="articles-page__list" id="tag-articles">

      <div class="post-row__tags"><a class="post-tag" href="/articles/tag/news/">news</a><a class="post-tag" href="/articles/tag/release/">release</a><a class="post-tag" href="/articles/tag/beta/">beta</a></div>
      <h2 class="post-row__title">
        <a href="/articles/2010/11/06/psycopg-230-beta1-released/">Psycopg 2.3.0-beta1 released</a>
      </h2>
      <div class="post-row__byline">

  <div class="articles-pagination" id="tag-pagination"></div>
</div>
<script>
(function () {
  var PER_PAGE = 10;
  var rows = document.querySelectorAll('#tag-articles .post-row');
  var total = rows.length;
  var pages = Math.ceil(total / PER_PAGE);
  if (pages <= 1) return;

  var current = 1;

  function show(page) {
    current = page;
    var start = (page - 1) * PER_PAGE;
    rows.forEach(function (row, i) {
      var visible = i >= start && i < start + PER_PAGE;
      row.style.display = visible ? '' : 'none';
      row.style.borderTop = (visible && i === start) ? 'none' : '';
    });
    render();
  }

  function render() {
    var el = document.getElementById('tag-pagination');
    var prev = current > 1
      ? '<a href="#" data-page="' + (current - 1) + '" class="pagination__prev"><span class="pag-arrow">&#8592;</span> prev</a>'
      : '<span class="pagination__prev disabled"><span class="pag-arrow">&#8592;</span> prev</span>';
    var next = current < pages
      ? '<a href="#" data-page="' + (current + 1) + '" class="pagination__next">next <span class="pag-arrow">&#8594;</span></a>'
      : '<span class="pagination__next disabled">next <span class="pag-arrow">&#8594;</span></span>';
    el.innerHTML = '<div class="pagination">' + prev
      + '<span class="pagination__info">page ' + current + ' of ' + pages + '</span>'
      + next + '</div>';

    el.querySelectorAll('[data-page]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        show(parseInt(this.dataset.page));
        document.querySelector('.articles-page').scrollIntoView({ behavior: 'smooth' });
      });
    });
  }

  show(1);
}());
</script>
